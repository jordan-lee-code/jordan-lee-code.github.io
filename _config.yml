url: "https://lee-it.co.uk"
baseurl: ""

remote_theme: mmistakes/minimal-mistakes
minimal_mistakes_skin: dark

locale: en-GB
timezone: Europe/London

author:
  name: Jordan Lee
  bio: "DevOps & Cloud Infrastructure Engineer. Azure • Terraform • Bicep • CI/CD."
  location: Leeds, UK
  email: jordan@lee-it.co.uk
  links:
    - label: LinkedIn
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/jordan-lee-devops"

footer:
  links:
    - label: LinkedIn
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/jordan-lee-devops"

include:
  - _pages

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-sitemap

defaults:
