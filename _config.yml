lang: en
timezone: Europe/London

title: Jordan Lee
tagline: DevOps & Cloud Infrastructure Engineer
description: DevOps & Cloud Infrastructure Engineer — portfolio and blog
url: "https://lee-it.co.uk"
baseurl: ""

github:
  username: jordan-lee-code

social:
  name: Jordan Lee
  email: jordan@lee-it.co.uk
  links:
    - https://www.linkedin.com/in/jordan-lee-devops

theme_mode: dark

avatar: ""

remote_theme: cotes2020/jekyll-theme-chirpy

toc: true

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    block:
      line_numbers: true

paginate: 10

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      pin: false
  - scope:
      path: _tabs
    values:
      layout: page
      permalink: /:title/
  - scope:
      path: ""
    values:
      layout: page

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-sitemap
  - jekyll-paginate
