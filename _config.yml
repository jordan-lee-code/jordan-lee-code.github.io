lang: en
timezone: Europe/London

title: Jordan Lee
tagline: DevOps & Cloud Infrastructure Engineer
description: DevOps & Cloud Infrastructure Engineer — portfolio and blog
url: "https://lee-it.co.uk"
baseurl: ""

github:
  username: jordan-lee-code

social:
  name: Jordan Lee
  email: contact@lee-it.co.uk
  links:
    - https://www.linkedin.com/in/jordan-lee-devops

theme_mode: dark

avatar: "/assets/img/avatar.webp"
image: "/assets/img/avatar.webp"

search: true

theme: jekyll-theme-chirpy

toc: true

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    block:
      line_numbers: true

paginate: 10

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      pin: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/
      read_time: true
  - scope:
      path: ""
    values:
      layout: page

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

plugins:
  - jekyll-seo-tag
  - jekyll-include-cache
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-archives
  - jekyll-feed
